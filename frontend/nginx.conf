# nginx template — environment variables (${PORT}, ${BACKEND_URL}) are
# substituted by the nginx:alpine entrypoint at container startup.
server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts to give Render's sleeping backend enough time to wake up
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SPA fallback — serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
